<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berlin Budget City</title>
  <meta name="description" content="Explore Berlin budget items as a Three.js city skyline.">
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=berlin-budget-city-1">
  <link rel="preload" href="./assets/fonts/silkscreen.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/nunito.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="./styles/app.css?v=berlin-upstream-ui-sync-1">
  <script src="./assets/vendor/three.min.js"></script>
  <script src="./assets/vendor/GLTFLoader.js"></script>
  <script type="module" src="./src/app.js?v=park-intro-restore-1"></script>
</head>
<body>
  <div id="app">
    <div id="loading" class="loading">
      <h1 class="loading__title">budget.city</h1>
      <p id="loadingStatus" class="loading__status">Preparing Berlin budget dataset...</p>
    </div>

    <div id="stage" class="stage" aria-label="3D city explorer"></div>

    <section class="search-shell" aria-label="Search budget items">
      <button id="closeSearch" class="search-shell__close" type="button" aria-label="Close search">×</button>
      <div class="search-filters">
        <label class="search-filter">
          <span>Year</span>
          <select id="yearFilter" class="search-select" aria-label="Filter by year">
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="all">All years</option>
          </select>
        </label>
        <label class="search-filter">
          <span>Type</span>
          <select id="typeFilter" class="search-select" aria-label="Filter by title type">
            <option value="ausgaben">Ausgaben</option>
            <option value="einnahmen">Einnahmen</option>
            <option value="all">Alles</option>
          </select>
        </label>
      </div>
      <input id="articleSearch" class="search-input" type="text" placeholder="Search budget items..." autocomplete="off" spellcheck="false" aria-label="Search budget items">
      <div id="searchResults" class="search-results" role="listbox"></div>
    </section>

    <button id="musicBtn" class="music-btn" type="button" aria-label="Toggle music" title="Toggle music">🔊</button>
    <button id="skylineBtn" class="skyline-btn" type="button" aria-label="Watch the skyline" title="Watch the skyline">🏙️</button>
    <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>

    <aside id="inspector" class="inspector" aria-label="Budget item details">
      <button id="closeInspector" class="inspector__close" type="button" aria-label="Close budget item details">×</button>
      <p class="inspector__eyebrow">Selected Budget Item</p>
      <h2 id="articleTitle" class="inspector__title"></h2>
      <p id="articleTagline" class="inspector__tagline"></p>

      <figure id="articlePreview" class="article-preview" hidden>
        <img id="articleImage" class="article-preview__image" alt="">
      </figure>

      <section class="article-summary" aria-live="polite">
        <p id="articleSummaryState" class="article-summary__state">Select a budget item to load its Berlin budget details.</p>
        <p id="articleDescription" class="article-summary__description" hidden></p>
        <p id="articleExtract" class="article-summary__extract" hidden></p>
      </section>

      <dl class="stats-grid">
        <div class="stats-grid__item">
          <dt>Rank</dt>
          <dd id="articleRank">-</dd>
        </div>
        <div class="stats-grid__item">
          <dt>Budget</dt>
          <dd id="articleViews">-</dd>
        </div>
        <div class="stats-grid__item">
          <dt>Code / Jahr</dt>
          <dd id="articleWords">-</dd>
        </div>
        <div class="stats-grid__item">
          <dt>Floors</dt>
          <dd id="articleFloors">-</dd>
        </div>
      </dl>

      <a id="articleLink" class="article-link" href="https://haushaltsdaten.odis-berlin.de/visualisierung/" target="_blank" rel="noopener">Open in Berliner Haushaltsdaten</a>

      <section class="neighbors">
        <div class="neighbors__header">
          <h3>Nearby Buildings</h3>
          <p>Closest neighbors in the layout</p>
        </div>
        <div id="neighborList" class="neighbor-list"></div>
      </section>
    </aside>
  </div>
  <audio id="bgMusic" src="./assets/media/audio/citydreams.mp3" loop preload="auto"></audio>
  <script>
    (function() {
      var m = document.getElementById("bgMusic");
      var btn = document.getElementById("musicBtn");
      m.volume = 0.04;
      var muted = false;
      function go() {
        m.play().then(function() {
          btn.style.opacity = "1";
          btn.style.pointerEvents = "auto";
          document.removeEventListener("pointerdown", go, true);
          document.removeEventListener("click", go, true);
          document.removeEventListener("keydown", go, true);
        }).catch(function() {});
      }
      document.addEventListener("pointerdown", go, true);
      document.addEventListener("click", go, true);
      document.addEventListener("keydown", go, true);
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        m.muted = true;
        btn.textContent = "🔇";
        btn.style.transition = "opacity 2s ease";
        btn.style.opacity = "0";
        btn.style.pointerEvents = "none";
      });
      go();
    })();
  </script>
</body>
</html>
