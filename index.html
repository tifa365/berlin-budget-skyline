<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WikiCity</title>
  <meta name="description" content="Explore Wikipedia articles as a Three.js city skyline.">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="stylesheet" href="./styles/app.css?v=wednesday-poster-1">
  <script src="./assets/vendor/three.min.js"></script>
  <script src="./assets/vendor/GLTFLoader.js"></script>
  <script type="module" src="./src/app.js?v=vice-pink-1"></script>
</head>
<body>
  <div id="app">
    <div id="loading" class="loading">
      <h1 class="loading__title">wiki.city</h1>
      <p id="loadingStatus" class="loading__status">Preparing article dataset...</p>
    </div>

    <div id="stage" class="stage" aria-label="3D city explorer"></div>

    <section class="search-shell" aria-label="Search articles">
      <button id="closeSearch" class="search-shell__close" type="button" aria-label="Close search">×</button>
      <input id="articleSearch" class="search-input" type="text" placeholder="Search articles..." autocomplete="off" spellcheck="false" aria-label="Search articles">
      <div id="searchResults" class="search-results" role="listbox"></div>
    </section>

    <button id="musicBtn" class="music-btn" type="button" aria-label="Toggle music" title="Toggle music">🔊</button>
    <button id="skylineBtn" class="skyline-btn" type="button" aria-label="Watch the skyline" title="Watch the skyline">🏙️</button>
    <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>

    <aside id="inspector" class="inspector" aria-label="Article details">
      <button id="closeInspector" class="inspector__close" type="button" aria-label="Close article details">×</button>
      <p class="inspector__eyebrow">Selected Article</p>
      <h2 id="articleTitle" class="inspector__title"></h2>
      <p id="articleTagline" class="inspector__tagline"></p>

      <figure id="articlePreview" class="article-preview" hidden>
        <img id="articleImage" class="article-preview__image" alt="">
      </figure>

      <section class="article-summary" aria-live="polite">
        <p id="articleSummaryState" class="article-summary__state">Select an article to load its live Wikipedia preview.</p>
        <p id="articleDescription" class="article-summary__description" hidden></p>
        <p id="articleExtract" class="article-summary__extract" hidden></p>
      </section>

      <dl class="stats-grid">
        <div class="stats-grid__item">
          <dt>Rank</dt>
          <dd id="articleRank">-</dd>
        </div>
        <div class="stats-grid__item">
          <dt>Views</dt>
          <dd id="articleViews">-</dd>
        </div>
        <div class="stats-grid__item">
          <dt>Page Size</dt>
          <dd id="articleWords">-</dd>
        </div>
        <div class="stats-grid__item">
          <dt>Floors</dt>
          <dd id="articleFloors">-</dd>
        </div>
      </dl>

      <a id="articleLink" class="article-link" href="https://de.wikipedia.org/wiki/Hauptseite" target="_blank" rel="noopener">Open on German Wikipedia</a>

      <section class="neighbors">
        <div class="neighbors__header">
          <h3>Nearby Buildings</h3>
          <p>Closest neighbors in the layout</p>
        </div>
        <div id="neighborList" class="neighbor-list"></div>
      </section>
    </aside>
  </div>
  <audio id="bgMusic" src="./assets/media/audio/citydreams.mp3" loop preload="auto"></audio>
  <script>
    (function() {
      var m = document.getElementById("bgMusic");
      var btn = document.getElementById("musicBtn");
      m.volume = 0.04;
      var muted = false;
      function go() {
        m.play().then(function() {
          btn.style.opacity = "1";
          btn.style.pointerEvents = "auto";
          document.removeEventListener("pointerdown", go, true);
          document.removeEventListener("click", go, true);
          document.removeEventListener("keydown", go, true);
        }).catch(function() {});
      }
      document.addEventListener("pointerdown", go, true);
      document.addEventListener("click", go, true);
      document.addEventListener("keydown", go, true);
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        m.muted = true;
        btn.textContent = "🔇";
        btn.style.transition = "opacity 2s ease";
        btn.style.opacity = "0";
        btn.style.pointerEvents = "none";
      });
      go();
    })();
  </script>
</body>
</html>
